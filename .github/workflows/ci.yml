# GitHub Actions CI workflow.
#
# Runs on every push to any branch and on every pull request to master.
# Checks:
#   1. cargo fmt   — enforces consistent Rust formatting (rustfmt)
#   2. cargo clippy — Rust's linter (catches common mistakes and bad idioms)
#   3. cargo test  — runs unit tests (including the JWT tests in jwt.rs)
#   4. cargo build — makes sure the project actually compiles
#
# Jobs run in parallel by default. The build job depends on test passing.
#
# GitHub provides free CI minutes for public repos. The runner is a Ubuntu VM
# with Rust pre-installed (via actions-rs/toolchain or the rust toolchain file).

name: CI

on:
  push:
    branches: ["**"]       # every branch
  pull_request:
    branches: [master]

env:
  CARGO_TERM_COLOR: always   # colored cargo output in CI logs

jobs:
  # ── Format check ─────────────────────────────────────────────────────────────
  fmt:
    name: Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable + rustfmt
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
          # dtolnay/rust-toolchain is the community standard — faster and more
          # reliable than the deprecated actions-rs/toolchain.

      - name: Check formatting
        run: cargo fmt --all -- --check
        # `--check` exits non-zero if any file would be reformatted.
        # Fix locally with: cargo fmt

  # ── Clippy ────────────────────────────────────────────────────────────────────
  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable + clippy
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Cache dependencies
        uses: Swatinem/rust-cache@v2
        # Caches ~/.cargo/registry and target/ between runs.
        # Without this, every CI run downloads and compiles all crates (~3 min).
        # With cache: ~30 seconds on cache hit.

      - name: Run Clippy
        run: cargo clippy --all-targets --all-features -- -D warnings
        # -D warnings: treat all warnings as errors (keeps the codebase clean).

  # ── Tests ─────────────────────────────────────────────────────────────────────
  test:
    name: Test
    runs-on: ubuntu-latest
    # We don't run integration tests (which need a real DB) in CI yet.
    # The #[cfg(test)] modules in jwt.rs are pure unit tests — no DB needed.
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Cache dependencies
        uses: Swatinem/rust-cache@v2

      - name: Run tests
        run: cargo test --lib
        # --lib: only runs tests in library crates and inline #[cfg(test)] modules.
        # Skips integration tests that would need a running Postgres.

  # ── Build ─────────────────────────────────────────────────────────────────────
  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [fmt, clippy, test]
    # `needs` means this job only starts if fmt, clippy, and test all pass.
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Cache dependencies
        uses: Swatinem/rust-cache@v2

      - name: Build release binary
        run: cargo build --release
        # Verifies the project compiles in release mode (some optimizations can
        # expose errors that debug mode misses, though this is rare in practice).

  # ── Docker build (on master only) ────────────────────────────────────────────
  docker:
    name: Docker Build & Push
    runs-on: ubuntu-latest
    needs: [build]
    # Only build and push Docker images from master — not from feature branches.
    if: github.ref == 'refs/heads/master'
    permissions:
      contents: read
      packages: write   # needed to push to GitHub Container Registry (ghcr.io)
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
          # GITHUB_TOKEN is automatically provided by GitHub Actions.
          # No manual secret setup needed for ghcr.io.

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        # Buildx enables layer caching (--cache-from / --cache-to) which
        # dramatically speeds up repeated Docker builds in CI.

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/idktfctf:latest
            ghcr.io/${{ github.repository_owner }}/idktfctf:${{ github.sha }}
          cache-from: type=gha    # read cache from GitHub Actions cache
          cache-to:   type=gha,mode=max   # write cache (max = cache all layers)
