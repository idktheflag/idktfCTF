apiVersion: apps/v1
kind: Deployment
metadata:
  name: ctf-postgres
  namespace: ctf
  labels:
    app: ctf-postgres
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ctf-postgres
  template:
    metadata:
      labels:
        app: ctf-postgres
    spec:
      containers:
        - name: postgres
          image: postgres:16-alpine
          ports:
            - containerPort: 5432
          env:
            - name: POSTGRES_USER
              value: ctf
            - name: POSTGRES_DB
              value: ctf
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: ctf-postgres-secret
                  key: POSTGRES_PASSWORD
          volumeMounts:
            - name: postgres-storage
              mountPath: /var/lib/postgresql/data
              subPath: postgres
          readinessProbe:
            exec:
              command:
                - pg_isready
                - -U
                - ctf
                - -d
                - ctf
            initialDelaySeconds: 5   # wait 5s before first check
            periodSeconds: 5         # check every 5s
          livenessProbe:
            exec:
              command:
                - pg_isready
                - -U
                - ctf
                - -d
                - ctf
            initialDelaySeconds: 30  # give Postgres more time to initialize
            periodSeconds: 10
            failureThreshold: 6      # restart after 6 consecutive failures (~1 min)
      volumes:
        - name: postgres-storage
          persistentVolumeClaim:
            claimName: postgres-pvc
